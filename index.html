  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="#home" data-text="profile.name">Shi Jun</a>
      <div class="nav-links" data-nav></div>
      <div class="toolbar" aria-label="Page settings">
        <button class="tool-button" type="button" data-lang-toggle>中文 / EN</button>
        <select class="theme-select" data-theme-select aria-label="Theme"></select>
      </div>
    </nav>
  </header>

  <main id="home" class="page-shell">
    <aside class="profile-panel" aria-label="Profile">
      <img class="avatar" data-src="profile.avatar" data-alt="profile.name" src="" alt="">
      <h1 data-text="profile.name"></h1>
      <p class="name-cn" data-text="profile.nameCn"></p>
      <p class="position" data-text="profile.title"></p>
      <p class="institution" data-text="profile.affiliation"></p>
      <p class="location"><svg class="link-icon" aria-hidden="true" focusable="false"><use href="#icon-location"></use></svg><span data-text="profile.location"></span></p>
      <div class="profile-links" data-list="links"></div>
    </aside>

    <article class="content-column">
      <section id="biography" class="content-section biography-section">
        <h2 data-label="biography"></h2>
        <div class="summary" data-paragraphs="hero.summary"></div>
      </section>

      <section id="research" class="content-section">
        <h2 data-label="research"></h2>
        <ul class="topic-list" data-list="research"></ul>
      </section>

      <aside class="recruiting-note" data-paragraphs="recruiting"></aside>

      <section id="news" class="content-section">
        <h2 data-label="news"></h2>
        <ul class="news-list" data-list="news"></ul>
      </section>

      <section id="publications" class="content-section">
        <h2 data-label="publications"></h2>
        <div class="publication-groups" data-list="publications"></div>
      </section>

      <section id="projects" class="content-section">
        <h2 data-label="projects"></h2>
        <ul class="compact-list project-compact-list" data-list="projects"></ul>
      </section>

      <section id="apps" class="content-section">
        <h2 data-label="apps"></h2>
        <div class="app-grid" data-list="apps"></div>
      </section>

      <section id="services" class="content-section">
        <h2 data-label="services"></h2>
        <ul class="compact-list" data-list="services"></ul>
      </section>

      <section id="education" class="content-section">
        <h2 data-label="education"></h2>
        <ol class="timeline-list" data-list="education"></ol>
      </section>

      <section id="awards" class="content-section">
        <h2 data-label="awards"></h2>
        <ul class="compact-list" data-list="awards"></ul>
      </section>

    </article>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>© <span data-text="meta.year"></span> <span data-text="profile.name"></span>. <span data-text="meta.copyright"></span></span>
      <span><span data-text="meta.updatedLabel"></span>: <span data-text="meta.updated"></span></span>
      <span><span data-text="meta.viewsLabel"></span>: <span data-visit-count></span></span>
    </div>
  </footer>
</body>
</html>
